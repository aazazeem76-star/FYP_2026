{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete — FRA System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card-wrap { background:white; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,.3); overflow:hidden; max-width:420px; width:100%; }
        .hdr { background:linear-gradient(135deg,#10b981,#059669); color:white; padding:3rem 2rem; text-align:center; }
        .check-circle { width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; font-size:2.2rem; animation:pop .5s ease; }
        @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
        .hdr h2 { margin:0; font-weight:700; font-size:1.6rem; }
        .hdr p { margin:.4rem 0 0; opacity:.85; font-size:.92rem; }
        .bd { padding:2.5rem; text-align:center; }
        .btn-main { display:block; width:100%; padding:.8rem; border-radius:10px; font-weight:600; background:linear-gradient(135deg,#667eea,#764ba2); border:none; color:white; transition:all .3s; text-decoration:none; font-size:1rem; }
        .btn-main:hover { transform:translateY(-2px); box-shadow:0 10px 20px rgba(102,126,234,.35); color:white; }
    </style>
</head>
<body>
<div class="container px-3">
    <div class="card-wrap mx-auto">
        <div class="hdr">
            <div class="check-circle"><i class="fas fa-check"></i></div>
            <h2>Password Reset!</h2>
            <p>Your password has been updated successfully.</p>
        </div>
        <div class="bd">
            <p class="text-muted mb-4" style="font-size:.93rem;">
                Your account is secure with your new password. You can now log in to the FRA System using your new credentials.
            </p>
            <a href="{% url 'login' %}" class="btn-main">
                <i class="fas fa-sign-in-alt me-2"></i>Login Now
            </a>
            <div class="mt-3">
                <a href="{% url 'index' %}" style="color:#667eea;text-decoration:none;font-size:.9rem;font-weight:500;">
                    <i class="fas fa-home me-1"></i>Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
